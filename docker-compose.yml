version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: job_postgres
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass
      POSTGRES_DB: jobdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: job_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: job_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://jobuser:jobpass@postgres:5432/jobdb
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: job_worker
    environment:
      DATABASE_URL: postgres://jobuser:jobpass@postgres:5432/jobdb
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
volumes:
  pgdata: